name: Enforce Branch Source Policy

on:
  create:

jobs:
  check-branch-source:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce GitHub Flow — branches must originate from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_BRANCH="${GITHUB_REF_NAME}"

          # Skip the protected branch itself
          if [ "$NEW_BRANCH" = "main" ]; then
            echo "Protected branch — skipping policy check."
            exit 0
          fi

          BRANCH_TIP="${GITHUB_SHA}"
          MAIN_TIP=$(git rev-parse "origin/main")

          echo "New branch : ${NEW_BRANCH}"
          echo "Branch tip : ${BRANCH_TIP}"
          echo "main tip   : ${MAIN_TIP}"

          # Allow if created from main HEAD
          if [ "$BRANCH_TIP" = "$MAIN_TIP" ]; then
            echo "Branch '${NEW_BRANCH}' was created from 'main'. OK."
            exit 0
          fi

          # Allow if the tip is reachable from main (i.e., based on main history)
          if git merge-base --is-ancestor "$BRANCH_TIP" "origin/main"; then
            echo "Branch '${NEW_BRANCH}' is based on 'main' history. OK."
            exit 0
          fi

          echo "::error::Branch '${NEW_BRANCH}' was not created from 'main'. GitHub Flow requires all branches to originate from 'main'."
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/${NEW_BRANCH}" || true
          echo "Branch '${NEW_BRANCH}' has been automatically deleted. Please re-create it from 'main'."
          exit 1
